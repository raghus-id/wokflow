# This is a basic workflow to help you get started with Actions

name: test workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Validate fch_ingest files are in ingest folder
      - name: Validate fch_ingest files location
        run: |
          # Get changed files based on event type
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          else
            # For push events, compare with previous commit
            if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
            else
              # Initial push - just check current files
              CHANGED_FILES=$(git ls-files)
            fi
          fi

          # Check if any fch_ingest files are outside ingest folder
          INVALID_FILES=""
          while IFS= read -r file; do
            if [[ "$file" == *"fch_ingest"* ]]; then
              if [[ ! "$file" =~ ^ingest/ ]]; then
                INVALID_FILES="$INVALID_FILES\n$file"
              fi
            fi
          done <<< "$CHANGED_FILES"

          if [ -n "$INVALID_FILES" ]; then
            echo "❌ ERROR: Files starting with 'fch_ingest' must be in the 'ingest' folder:"
            echo -e "$INVALID_FILES"
            exit 1
          fi

          echo "✅ All fch_ingest files are in the correct location"

      # Runs a one-line script
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
